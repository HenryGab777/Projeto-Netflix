<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
        <label class="toggle-switch" for="theme-toggle" aria-label="Alternar entre tema claro e escuro">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
    </header>

    <main>
        <section aria-label="Escolha de perfil">
            <ul class="profiles" aria-label="Lista não ordenada de grupos de perfis">
                <li>
                    <ol aria-label="Lista ordenada de perfis">
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="assets/perfil-1.jpg" alt="imagem de um cara com chapéu">
                                    <figcaption>Gabriel</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="assets/perfil-2.jpg" alt="imagem de homem usando bone azul">
                                    <figcaption>Henry</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="assets/perfil-3.jpg" alt="imagem de um cara com chapéu">
                                    <figcaption>Souza</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li class="profile">
                            <a href="catalogo/catalogo.html">
                                <figure>
                                    <img src="assets/perfil-4.jpg" alt="imagem de um cara com chapéu">
                                    <figcaption>Silva</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ol>
                </li>
            </ul>
        </section>
    </main>

        

    <footer>
        <p>Netflix - selecione um perfil para continuar</p>
    </footer>

    <script src="theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profileLinks = document.querySelectorAll('.profile a');
            profileLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    const img = link.querySelector('img');
                    const figcaption = link.querySelector('figcaption');
                    if (img && figcaption) {
                        localStorage.setItem('perfilAtivoNome', figcaption.textContent);
                        localStorage.setItem('perfilAtivoImagem', img.getAttribute('src'));
                    }
                });
            });
        });
    </script>
</body>
</html>
